<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FunPay Automation Tool</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="user-guide.css">
</head>
<body>
  <header class="app-header">
    <div class="brand-mark" aria-hidden="true">F</div>
    <div class="app-header__copy">
      <h1>FunPay Automation</h1>
      <p>Инструменты продавца</p>
    </div>
    <button class="header-help" id="open-user-guide" type="button">Справка</button>
  </header>

  <main>
    <section class="card">
      <div class="control-row">
        <div class="control-copy">
          <h2>Авто-поднятие</h2>
          <p>Проверять активные категории каждые 4 часа.</p>
        </div>
        <label class="switch" title="Включить авто-поднятие">
          <input type="checkbox" id="auto-bump-toggle">
          <span class="switch-track" aria-hidden="true"></span>
        </label>
      </div>

      <button class="primary-button" id="bump-now-button" type="button">
        Поднять сейчас
      </button>

      <div class="inline-status" id="inline-status" role="status" aria-live="polite"></div>
    </section>

    <section class="activity">
      <div class="section-heading">
        <h2>Последние операции</h2>
        <button class="text-button" id="refresh-state-button" type="button">Обновить</button>
      </div>

      <div class="activity-list">
        <article class="activity-item" id="bump-activity">
          <div class="activity-icon activity-icon--bump" aria-hidden="true">↑</div>
          <div class="activity-copy">
            <h3>Поднятие объявлений</h3>
            <p id="bump-activity-text">Операций пока не было</p>
          </div>
          <time id="bump-activity-time"></time>
        </article>

        <article class="activity-item" id="multipost-activity">
          <div class="activity-icon activity-icon--copy" aria-hidden="true">+</div>
          <div class="activity-copy">
            <h3>Мультипостинг</h3>
            <p id="multipost-activity-text">Операций пока не было</p>
          </div>
          <time id="multipost-activity-time"></time>
        </article>
      </div>
    </section>

    <section class="hint">
      <strong>Мультипостинг</strong>
      <span>Панель появится на странице создания или редактирования объявления.</span>
    </section>
  </main>

  <script src="user-guide.js"></script>
  <script src="popup.js"></script>
</body>
</html>
